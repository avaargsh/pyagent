runtime:
  default_timeout_seconds: 30
  max_retry_count: 3
  default_budget_tokens: 12000
  max_context_tokens: 2000
  recent_message_window: 6
  compaction_target_tokens: 400
  background_task_timeout_seconds: 900

api:
  base_url: http://localhost:8000
  request_timeout_seconds: 30

cli:
  default_output: human
  no_input: false

observability:
  enable_tracing: true
  redact_secrets: true
